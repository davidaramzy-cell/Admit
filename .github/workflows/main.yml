const COLS = ["name","pmd","spec","admit","anum","group","upd"];
const REC = DATA.map(r=>Object.fromEntries(COLS.map((c,i)=>[c,r[i]||""])));

/* ---- classify a directory entry into a disposition ---- */
function classify(e){
  const a=(e.admit||"").toLowerCase();
  if(a.startsWith("hospitalist") || a.includes("medical service")){
    return {type:"med", label:"Medical Service", who:"Hospitalist", num:e.anum||"x4929",
      action:`This PMD is covered by the <b>Hospitalist / medical service</b> in EmReference. Assign to <b>Medical Service</b> and call the Hospitalist.`};
  }
  if(a.includes("pediatric hospitalist")){
    return {type:"peds", label:"Pediatric Hospitalist", who:"Pediatric Hospitalist", num:e.anum||"",
      action:`Pediatric patient — route to the <b>Pediatric Hospitalist</b> team.`};
  }
  if(a.includes("hva admitting team")){
    return {type:"call", label:"HVA Admitting Team", who:"HVA Admitting Team", num:e.anum||"(201) 490-1217",
      action:`This PMD admits through <b>HVA</b>. Call the <b>HVA Admitting Team</b> to hand off.`, refusable:true};
  }
  if(a.includes("call first")){
    return {type:"call", label:"Call First", who:(e.admit||"Attending"), num:e.anum||"",
      action:`<b>Call first</b> — this PMD/attending will direct the admission.`, refusable:true};
  }
  // named private attending (incl. covering arrangements, "Makar > Pinzon", group names)
  return {type:"call", label:"Private Attending", who:e.admit, num:e.anum||"",
    action:`This PMD <b>admits here</b>. Call <b>${esc(e.admit)}</b> directly and hand off the admission.`, refusable:true};
}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function telHref(num){const d=(num||"").replace(/[^0-9]/g,""); return (d.length>=7 && !/x4929/i.test(num))?("tel:"+d):null;}
function stale(upd){ if(!upd) return false; const m=upd.match(/(\d{2})\/(\d{2})\/(\d{4})/); if(!m) return false;
  const d=new Date(+m[3], +m[2]-1, +m[1]); return (Date.now()-d)/(1000*3600*24) > 730; }

/* ---- state & flow ---- */
let S = {ins:null, pmd:null, hiv:null, pick:null, accepted:null, step:"ins"};

const path=document.getElementById('path');
const stage=document.getElementById('stage');
document.getElementById('reset').onclick=reset;

function reset(){ S={ins:null,pmd:null,hiv:null,pick:null,accepted:null,step:"ins"}; render(); }

function render(){ drawPath(); drawStage(); }

function node(label,ans,state){
  return `<div class="pnode ${state}"><div class="pdot"><i></i><div class="bar"></div></div>
     <div class="ptext"><div class="plabel">${label}</div><div class="pans">${ans||"—"}</div></div></div>`;
}
function drawPath(){
  const steps=[];
  steps.push(["Insurance", S.ins==null?null:(S.ins?"Has insurance":"No insurance / self-pay")]);
  if(S.ins){ steps.push(["PCP / PMD on Care Team", S.pmd==null?null:(S.pmd?"PMD listed":"None listed")]); }
  if(S.ins && S.pmd){ steps.push(["PMD = our HIV clinic?", S.hiv==null?null:(S.hiv?"Yes":"No")]); }
  if(S.ins && S.pmd && S.hiv===false){ steps.push(["PMD lookup", S.pick?S.pick.name:null]); }
  if(S.pick && S.pick.disp && S.pick.disp.refusable && S.accepted!=null){
    steps.push(["Attending response", S.accepted?"Accepted":"Refused"]);
  }
  const active = stepIndex();
  path.innerHTML = steps.map((s,i)=>{
    const st = i<active?"done":(i===active?"active":"pending");
    return node(s[0], s[1], st);
  }).join("");
}
function stepIndex(){
  let i=0;
  if(S.ins!=null) i++; if(S.ins===false) return i-1<0?0:i-1+0; // handled by outcome
  if(S.ins){ if(S.pmd!=null) i++; }
  if(S.ins&&S.pmd){ if(S.hiv!=null) i++; }
  if(S.ins&&S.pmd&&S.hiv===false){ if(S.pick) i++; }
  return Math.min(i, 6);
}

function drawStage(){
  // terminal outcomes ------------------------------------------------
  if(S.ins===false)               return outcome("us","No insurance / self-pay","Admit to <b>Our Service</b> — we take self-pay patients <b>any day</b>.");
  if(S.ins && S.pmd===false)      return outcome("us","Insurance, no PMD listed","No PCP on the Care Team → admit to <b>Our Service</b>, regardless of day.");
  if(S.ins && S.pmd && S.hiv===true) return outcome("us","Our HIV clinic patient","PMD is our <b>HIV clinic</b> → admit to <b>Our Service</b>, any day.");

  if(S.pick){ return pickResult(); }

  // questions --------------------------------------------------------
  if(S.step==="ins") return ask({
    q:"Does the patient have insurance?",
    hint:"Start in the chart: check the insurance status and the Care Team section.",
    opts:[
      {cls:"", ic:"✓", t:"Has insurance", s:"Commercial, Medicare, Medicaid, etc.", go:()=>{S.ins=true;S.step="pmd";render();}},
      {cls:"flat", ic:"○", t:"No insurance / self-pay", s:"→ Our Service, any day", go:()=>{S.ins=false;render();}}
    ]});

  if(S.step==="pmd") return ask({
    q:"Is a PCP / PMD listed on the Care Team?",
    hint:"Look at the Care Team section for a named Primary Care Provider.",
    back:()=>{S.ins=null;S.step="ins";render();},
    opts:[
      {cls:"", ic:"✓", t:"Yes — a PMD is listed", s:"We'll look them up next", go:()=>{S.pmd=true;S.step="hiv";render();}},
      {cls:"flat", ic:"○", t:"No PMD listed", s:"→ Our Service, regardless", go:()=>{S.pmd=false;render();}}
    ]});

  if(S.step==="hiv") return ask({
    q:"Is the listed PMD our HIV clinic?",
    hint:"HIV-clinic patients come to us regardless of day.",
    back:()=>{S.pmd=null;S.step="pmd";render();},
    opts:[
      {cls:"alt", ic:"＋", t:"Yes — our HIV clinic", s:"→ Our Service, any day", go:()=>{S.hiv=true;render();}},
      {cls:"", ic:"→", t:"No — a regular PMD", s:"Look up who admits for them", go:()=>{S.hiv=false;S.step="look";render();}}
    ]});

  if(S.step==="look") return lookup();
}

/* ---- generic question card ---- */
function ask({q,hint,opts,back}){
  stage.innerHTML = `<div class="card">
    <p class="q">${q}</p><p class="qhint">${hint}</p>
    <div class="opts">${opts.map((o,i)=>`<button class="opt ${o.cls}" data-i="${i}">
      <span class="ic">${o.ic}</span><span class="grow"><b>${o.t}</b><span>${o.s}</span></span></button>`).join("")}</div>
    ${back?'<button class="back" id="bk">‹ Back</button>':''}
  </div>`;
  [...stage.querySelectorAll('.opt')].forEach(b=>b.onclick=()=>opts[+b.dataset.i].go());
  if(back) stage.querySelector('#bk').onclick=back;
}

/* ---- PMD search ---- */
function lookup(){
  stage.innerHTML = `<div class="card">
    <p class="q">Look up the PMD</p>
    <p class="qhint">Type the PMD's name as it appears in EmReference. The directory shows who admits their patients.</p>
    <div class="srch">
      <input id="q" type="text" autocomplete="off" placeholder="Start typing a name… e.g. Bikkina, Doss, Old Hook">
      <div class="results" id="rl"></div>
    </div>
    <button class="back" id="bk">‹ Back</button>
  </div>`;
  const q=stage.querySelector('#q'), rl=stage.querySelector('#rl');
  stage.querySelector('#bk').onclick=()=>{S.hiv=null;S.step="hiv";render();};
  let kbd=-1, cur=[];
  function run(){
    const v=q.value.trim().toLowerCase();
    if(v.length<1){ rl.className="results"; rl.innerHTML=""; return; }
    cur=REC.filter(e=>e.name.toLowerCase().includes(v)||(e.group||"").toLowerCase().includes(v)||(e.spec||"").toLowerCase().includes(v)).slice(0,8);
    rl.className="results show"; kbd=-1;
    if(!cur.length){ rl.innerHTML=`<div class="nohit"><b>Not in this directory.</b><br>Default per protocol: <b>Medical Service</b> (Hospitalist, x4929). Verify on EmReference.com or the group chat.</div>`; return; }
    rl.innerHTML=cur.map((e,i)=>{const d=classify(e);
      return `<div class="ritem" data-i="${i}"><div><div class="rname">${esc(e.name)}</div>
        <div class="rmeta">${esc([e.spec,e.group].filter(Boolean).join(" · ")||"—")}</div></div>
        <span class="rtag t-${d.type}">${d.label}</span></div>`;}).join("");
    [...rl.querySelectorAll('.ritem')].forEach(it=>it.onclick=()=>choose(cur[+it.dataset.i]));
  }
  q.addEventListener('input',run);
  q.addEventListener('keydown',ev=>{
    const items=[...rl.querySelectorAll('.ritem')]; if(!items.length) return;
    if(ev.key==="ArrowDown"){ev.preventDefault();kbd=Math.min(kbd+1,items.length-1);}
    else if(ev.key==="ArrowUp"){ev.preventDefault();kbd=Math.max(kbd-1,0);}
    else if(ev.key==="Enter"){ev.preventDefault(); if(kbd>=0) choose(cur[kbd]); return;}
    else return;
    items.forEach((it,i)=>it.classList.toggle('kbd',i===kbd));
  });
  q.focus();
}
function choose(e){ S.pick={...e, disp:classify(e)}; S.accepted=null; render(); }

/* ---- result for a chosen PMD ---- */
function pickResult(){
  const e=S.pick, d=e.disp;
  // refusal flips refusable dispositions to Medical Service
  if(d.refusable && S.accepted===false){
    return outcome("med","PMD declined / not admitting","The PMD or attending <b>declined</b> the admission → assign to <b>Medical Service</b> (Hospitalist, x4929).", extraDetail(e));
  }
  const tel=telHref(d.num);
  let contact="";
  if(d.type==="med"){
    contact=`<div class="ext"><span class="pic">＃</span><span>Hospitalist — <b>${esc(d.num||"x4929")}</b> (internal extension)</span></div>`;
  } else if(d.num){
    contact = tel
      ? `<a class="callbtn" href="${tel}"><span class="pic">☎</span><span class="grow"><div class="who">Call ${esc(d.who)}</div><div class="num">${esc(d.num)}</div></span></a>`
      : `<div class="callbtn"><span class="pic">☎</span><span class="grow"><div class="who">Call ${esc(d.who)}</div><div class="num">${esc(d.num)}</div></span></div>`;
  } else {
    contact = `<div class="callbtn"><span class="pic">☎</span><span class="grow"><div class="who">${esc(d.who)}</div><div class="num">No number on file — check EmReference / group chat</div></span></div>`;
  }
  let confirm="";
  if(d.refusable && S.accepted==null){
    confirm=`<div class="confirm"><p>Did ${esc(d.who)} accept the admission?</p>
      <div class="crow">
        <button class="cbtn yes" id="acc">Accepted — they admit</button>
        <button class="cbtn no" id="ref">Refused</button>
      </div></div>`;
  }
  const banner = d.type==="med" ? ["med","Assign to","Medical Service"]
              : d.type==="peds"? ["peds","Route to","Pediatric Hospitalist"]
              : ["call", S.accepted? "Confirmed — admit under":"Call to admit", d.who];

  stage.innerHTML = `<div class="res ${banner[0]}">
     <div class="banner"><div class="bic">${d.type==="med"?"＋":d.type==="peds"?"⊕":"☎"}</div>
       <div><div class="blab">${banner[1]}</div><div class="bbig">${esc(banner[2])}</div></div></div>
     <div class="body">
       <p class="action">${d.action}</p>
       ${contact}
       ${confirm}
       ${extraDetail(e)}
       <button class="again" id="again">New patient</button>
       <button class="back" id="bk">‹ Pick a different PMD</button>
     </div></div>`;
  stage.querySelector('#again').onclick=reset;
  stage.querySelector('#bk').onclick=()=>{S.pick=null;S.accepted=null;S.step="look";render();};
  if(d.refusable && S.accepted==null){
    stage.querySelector('#acc').onclick=()=>{S.accepted=true;render();};
    stage.querySelector('#ref').onclick=()=>{S.accepted=false;render();};
  }
}
function extraDetail(e){
  return `<dl class="detail">
    <dt>PMD</dt><dd>${esc(e.name)}</dd>
    ${e.spec?`<dt>Specialty</dt><dd>${esc(e.spec)}</dd>`:""}
    ${e.group?`<dt>Group</dt><dd>${esc(e.group)}</dd>`:""}
    <dt>EmRef admits</dt><dd>${esc(e.admit||"—")}${e.anum?` · ${esc(e.anum)}`:""}</dd>
    ${e.upd?`<dt>Updated</dt><dd class="${stale(e.upd)?'stale':''}">${esc(e.upd)}${stale(e.upd)?" · verify, &gt;2 yrs old":""}</dd>`:""}
  </dl>`;
}

/* ---- simple outcome (US / fallback) ---- */
function outcome(type,label,text,extra){
  const map={us:["☑","Admit to","Our Service"],med:["＋","Assign to","Medical Service"]};
  const b=map[type]||map.us;
  stage.innerHTML=`<div class="res ${type}">
    <div class="banner"><div class="bic">${b[0]}</div>
      <div><div class="blab">${b[1]}</div><div class="bbig">${b[2]}</div></div></div>
    <div class="body"><p class="action"><b>${label}.</b> ${text}</p>
      ${extra||""}
      <button class="again" id="again">New patient</button></div></div>`;
  stage.querySelector('#again').onclick=reset;
}

/* ---- protocol reference ---- */
document.getElementById('ptable').innerHTML=[
  ["No insurance / self-pay","us","Our Service"],
  ["Insurance + no PMD listed","us","Our Service"],
  ["Insurance + PMD is our HIV clinic","us","Our Service"],
  ["Insurance + PMD admits here (private, HVA, or hospitalist group)","call","Call that PMD"],
  ["Insurance + PMD refuses, or EmRef lists medical service","med","Medical Service"],
].map(r=>`<div class="prow"><div class="pcond">${r[0]}</div><span class="pout t-${r[1]}">${r[2]}</span></div>`).join("");

render();
</script>
</body>
</html>
