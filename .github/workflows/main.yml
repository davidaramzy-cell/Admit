<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MICU → Floor Admitting Router</title>
<style>
  :root{
    --ink:#0e1c24; --ink2:#15303b;
    --paper:#eef2f3; --card:#ffffff; --line:#dde5e8; --line2:#eef2f4;
    --muted:#5d6e78; --text:#16242c;
    --us:#0f766e;      --us-bg:#e6f4f1;
    --call:#1f54c4;    --call-bg:#e8eefb;
    --med:#b45309;     --med-bg:#fbeede;
    --peds:#6d28d9;    --peds-bg:#efe9fb;
    --warn:#b42318;    --warn-bg:#fbe9e7;
    --focus:#0f766e;
    --r:14px;
    --fs:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--text);font-family:var(--fs);-webkit-text-size-adjust:100%}
  body{padding:18px 14px 60px;display:flex;justify-content:center}
  .app{width:100%;max-width:560px}

  /* Header */
  .head{background:var(--ink);color:#eaf2f3;border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden}
  .head:before{content:"";position:absolute;inset:0;background:
     radial-gradient(120% 90% at 100% 0%, rgba(15,118,110,.45), transparent 60%);pointer-events:none}
  .kicker{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:#7fb7b2;font-weight:700;margin:0 0 4px}
  .h1{font-size:19px;font-weight:750;letter-spacing:-.01em;margin:0;line-height:1.15}
  .sub{font-size:12.5px;color:#a9c3c5;margin:6px 0 0}
  .reset{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.08);color:#dcebec;border:1px solid rgba(255,255,255,.16);
     font-size:11px;font-weight:650;letter-spacing:.02em;padding:7px 11px;border-radius:9px;cursor:pointer}
  .reset:hover{background:rgba(255,255,255,.16)}

  /* Path rail */
  .path{margin:14px 2px 2px;display:flex;flex-direction:column;gap:0}
  .pnode{display:flex;gap:11px;align-items:flex-start;min-height:30px}
  .pdot{flex:0 0 auto;width:18px;display:flex;flex-direction:column;align-items:center}
  .pdot i{width:11px;height:11px;border-radius:50%;background:var(--line);border:2px solid var(--card);box-shadow:0 0 0 1.5px var(--line);margin-top:3px}
  .pdot .bar{width:2px;flex:1;background:var(--line);min-height:14px;margin:2px 0}
  .pnode.done .pdot i{background:var(--us);box-shadow:0 0 0 1.5px var(--us)}
  .pnode.done .pdot .bar{background:var(--us)}
  .pnode.active .pdot i{background:var(--ink);box-shadow:0 0 0 1.5px var(--ink);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 1.5px var(--ink)}50%{box-shadow:0 0 0 4px rgba(14,28,36,.18)}}
  .ptext{padding-bottom:11px;flex:1;min-width:0}
  .plabel{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .pans{font-size:14px;font-weight:600;color:var(--text);margin-top:1px}
  .pnode.pending .plabel,.pnode.pending .pans{opacity:.45}

  /* Step card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-top:14px;
     box-shadow:0 1px 0 rgba(16,40,50,.02),0 10px 26px -22px rgba(16,40,50,.5);animation:rise .28s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .q{font-size:17px;font-weight:700;letter-spacing:-.01em;line-height:1.25;margin:0 0 3px}
  .qhint{font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.45}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:#fbfdfd;border:1.5px solid var(--line);
     border-radius:11px;padding:13px 14px;cursor:pointer;font:inherit;color:var(--text);transition:.13s}
  .opt:hover{border-color:var(--ink2);background:#f3f8f8}
  .opt:focus-visible{outline:3px solid color-mix(in srgb,var(--focus) 35%,transparent);outline-offset:1px}
  .opt b{font-size:14.5px;font-weight:680}
  .opt span{font-size:12px;color:var(--muted);display:block;margin-top:2px;font-weight:500}
  .opt .ic{flex:0 0 auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:15px;
     background:var(--us-bg);color:var(--us);font-weight:800}
  .opt.alt .ic{background:var(--call-bg);color:var(--call)}
  .opt.flat .ic{background:var(--line2);color:var(--muted)}
  .grow{flex:1;min-width:0}

  /* Search */
  .srch{position:relative}
  .srch input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:13px 14px;font:inherit;font-size:15px;background:#fbfdfd}
  .srch input:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px color-mix(in srgb,var(--focus) 18%,transparent)}
  .results{margin-top:8px;border:1px solid var(--line);border-radius:11px;overflow:hidden;max-height:300px;overflow-y:auto;display:none}
  .results.show{display:block}
  .ritem{padding:11px 13px;border-bottom:1px solid var(--line2);cursor:pointer;display:flex;justify-content:space-between;gap:10px;align-items:center}
  .ritem:last-child{border-bottom:0}
  .ritem:hover,.ritem.kbd{background:#f1f7f7}
  .rname{font-size:14px;font-weight:640}
  .rmeta{font-size:11.5px;color:var(--muted);margin-top:1px}
  .rtag{flex:0 0 auto;font-size:10px;font-weight:750;letter-spacing:.04em;text-transform:uppercase;padding:4px 8px;border-radius:999px;white-space:nowrap}
  .t-med{background:var(--med-bg);color:var(--med)} .t-call{background:var(--call-bg);color:var(--call)}
  .t-peds{background:var(--peds-bg);color:var(--peds)} .t-us{background:var(--us-bg);color:var(--us)}
  .nohit{padding:14px;font-size:13px;color:var(--muted);text-align:center}
  .nohit b{color:var(--text)}

  /* Result card */
  .res{border-radius:var(--r);padding:0;overflow:hidden;border:1px solid var(--line);margin-top:14px;animation:rise .3s ease both}
  .res .banner{padding:15px 18px;color:#fff;display:flex;align-items:center;gap:13px}
  .res .banner .bic{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:19px;flex:0 0 auto}
  .res .banner .blab{font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;opacity:.9}
  .res .banner .bbig{font-size:18px;font-weight:760;letter-spacing:-.01em;line-height:1.15;margin-top:2px}
  .res.us .banner{background:var(--us)} .res.call .banner{background:var(--call)}
  .res.med .banner{background:var(--med)} .res.peds .banner{background:var(--peds)}
  .res .body{background:var(--card);padding:16px 18px}
  .action{font-size:14.5px;line-height:1.5;font-weight:560;margin:0 0 4px}
  .action b{font-weight:740}
  .callbtn{display:flex;align-items:center;gap:11px;text-decoration:none;margin-top:12px;border:1.5px solid var(--line);
     border-radius:11px;padding:12px 14px;background:#fbfdfd;color:var(--text)}
  .callbtn:hover{border-color:var(--ink2);background:#f3f8f8}
  .callbtn .pic{width:34px;height:34px;border-radius:8px;background:var(--call-bg);color:var(--call);display:grid;place-items:center;font-size:16px;flex:0 0 auto}
  .callbtn .who{font-size:14px;font-weight:680} .callbtn .num{font-size:13px;color:var(--muted);margin-top:1px;font-variant-numeric:tabular-nums}
  .ext{display:inline-flex;align-items:center;gap:8px;margin-top:12px;background:var(--med-bg);color:var(--med);border-radius:10px;padding:11px 13px;font-size:13.5px;font-weight:650}
  .ext .pic{width:30px;height:30px;border-radius:7px;background:rgba(180,83,9,.16);display:grid;place-items:center;font-size:15px}

  .detail{margin-top:13px;border-top:1px solid var(--line2);padding-top:12px;display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:12.5px}
  .detail dt{color:var(--muted);font-weight:600} .detail dd{margin:0;font-weight:550}
  .stale{color:var(--warn);font-weight:650}

  .confirm{margin-top:14px;background:#f7fafa;border:1px solid var(--line);border-radius:12px;padding:14px}
  .confirm p{margin:0 0 10px;font-size:13.5px;font-weight:620}
  .crow{display:flex;gap:9px}
  .cbtn{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:11px;font:inherit;font-size:13px;font-weight:670;cursor:pointer}
  .cbtn.yes{border-color:var(--us);color:var(--us)} .cbtn.yes:hover{background:var(--us-bg)}
  .cbtn.no{border-color:var(--med);color:var(--med)} .cbtn.no:hover{background:var(--med-bg)}

  .again{margin-top:14px;width:100%;border:1.5px solid var(--ink2);background:var(--ink);color:#eaf2f3;border-radius:11px;padding:13px;font:inherit;font-size:14px;font-weight:680;cursor:pointer}
  .again:hover{background:var(--ink2)}
  .back{background:none;border:0;color:var(--muted);font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;margin-top:12px;padding:4px}
  .back:hover{color:var(--text)}

  /* Protocol */
  details.proto{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  details.proto>summary{list-style:none;cursor:pointer;padding:14px 16px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;color:var(--text)}
  details.proto>summary::-webkit-details-marker{display:none}
  details.proto>summary .chev{color:var(--muted);transition:.2s} details.proto[open]>summary .chev{transform:rotate(90deg)}
  .ptable{padding:0 16px 14px}
  .prow{display:flex;gap:11px;padding:10px 0;border-top:1px solid var(--line2);align-items:flex-start}
  .prow:first-child{border-top:0}
  .pcond{flex:1;font-size:12.5px;color:var(--text);font-weight:550}
  .pout{flex:0 0 auto;font-size:10px;font-weight:750;letter-spacing:.04em;text-transform:uppercase;padding:5px 9px;border-radius:999px;white-space:nowrap}
  .foot{text-align:center;font-size:11px;color:var(--muted);margin-top:16px;line-height:1.5}
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <button class="reset" id="reset">Restart</button>
    <p class="kicker">MICU → Floor Transfer</p>
    <h1 class="h1">Admitting Router</h1>
    <p class="sub">Answer each step to land the patient on the right service and the right phone call.</p>
  </div>

  <div class="path" id="path"></div>
  <div id="stage"></div>

  <details class="proto">
    <summary>Protocol at a glance <span class="chev">›</span></summary>
    <div class="ptable" id="ptable"></div>
  </details>

  <p class="foot">Decision aid only — confirm the PMD's current admitting status on EmReference.com or the group chat. Directory snapshot is editable in the source.</p>
</div>

